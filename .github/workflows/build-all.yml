name: Build — Matrix Exports

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  IOS_DEPLOYMENT_TARGET: '15.5'
  MACOS_DEPLOYMENT_TARGET: '10.15'

jobs:
  tests:
    name: Flutter Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          cache: true
      - working-directory: app
        run: |
          flutter pub get
          flutter test --reporter=expanded

  export-generic-files:
    name: Export Generic Files
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-generic-files
          path: |
            README.md
            app/pubspec.yaml
            packaging/**
          retention-days: 7

  export-android-paid:
    name: Export • Android Paid (APK + AAB)
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          cache: true
      - name: Bootstrap Android
        working-directory: app
        run: |
          flutter create --platforms=android --org com.koshkikode .
          flutter pub get
          python3 - <<'PY'
          from pathlib import Path
          import re

          files = [
              (Path('android/app/build.gradle.kts'), 'kts'),
              (Path('android/app/build.gradle'), 'gradle'),
          ]

          for path, kind in files:
              if not path.exists():
                  continue
              content = path.read_text(encoding='utf-8')
              updated, replacements = re.subn(
                  r'(minSdk(?:Version)?)(\s*=\s*)?\s*flutter\.minSdkVersion',
                  lambda m: f"{m.group(1)}{' = ' if m.group(2) else ' '}24",
                  content,
                  count=1,
              )
              if replacements == 0:
                  raise SystemExit(
                      f'Could not update minSdk in {path}; expected a line like '
                      'minSdk/minSdkVersion [=] flutter.minSdkVersion.'
                  )
              path.write_text(updated, encoding='utf-8')
              break
          else:
              raise SystemExit('Android Gradle build file not found.')
          PY
          dart run flutter_launcher_icons -f icons_android.yaml
      - name: Build Android (paid)
        working-directory: app
        run: |
          flutter build apk --release --dart-define=MOBILE_PAID=true
          flutter build appbundle --release --dart-define=MOBILE_PAID=true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-android-paid
          path: |
            app/build/app/outputs/flutter-apk/app-release.apk
            app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

  export-ios-paid:
    name: Export • iOS Paid (IPA)
    needs: tests
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          cache: true
      - name: Bootstrap iOS
        working-directory: app
        run: |
          flutter create --platforms=ios --org com.koshkikode .
          flutter pub get
          dart run flutter_launcher_icons -f icons_ios.yaml
      - name: Set iOS deployment target
        run: |
          sed -i '' "s/# platform :ios, '[0-9.]*'/platform :ios, '${IOS_DEPLOYMENT_TARGET}'/" app/ios/Podfile
          grep -Eq "^platform :ios, '${IOS_DEPLOYMENT_TARGET}'$" app/ios/Podfile
      - name: Build iOS (paid)
        working-directory: app
        run: flutter build ios --release --no-codesign --dart-define=MOBILE_PAID=true
      - name: Package iOS IPA (paid)
        run: |
          rm -rf /tmp/vetviona-paid-ipa
          mkdir -p /tmp/vetviona-paid-ipa/Payload
          cp -r app/build/ios/iphoneos/Runner.app /tmp/vetviona-paid-ipa/Payload/
          cd /tmp/vetviona-paid-ipa && zip -r /tmp/vetviona-paid.ipa Payload
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-ios-paid
          path: /tmp/vetviona-paid.ipa
          retention-days: 7

  export-windows-exe:
    name: Export • Windows Paid (EXE)
    needs: tests
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          cache: true
      - name: Bootstrap Windows
        working-directory: app
        run: |
          flutter config --enable-windows-desktop
          flutter create --platforms=windows --org com.koshkikode .
          flutter pub get
          dart run flutter_launcher_icons -f icons_windows.yaml
      - name: Build Windows (paid)
        working-directory: app
        run: flutter build windows --release --dart-define=PAID=true
      - name: Rename Windows executable
        run: cp app/build/windows/x64/runner/Release/vetviona_app.exe app/build/windows/x64/runner/Release/vetviona.exe
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-windows-exe
          path: app/build/windows/x64/runner/Release/
          retention-days: 7

  export-windows-msi:
    name: Export • Windows Paid (MSI)
    needs: tests
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          cache: true
      - name: Bootstrap Windows
        working-directory: app
        run: |
          flutter config --enable-windows-desktop
          flutter create --platforms=windows --org com.koshkikode .
          flutter pub get
          dart run flutter_launcher_icons -f icons_windows.yaml
      - name: Build Windows (paid)
        working-directory: app
        run: flutter build windows --release --dart-define=PAID=true
      - name: Rename Windows executable
        run: cp app/build/windows/x64/runner/Release/vetviona_app.exe app/build/windows/x64/runner/Release/vetviona.exe
      - name: Install WiX
        run: dotnet tool install --global wix --version 5.0.2
      - name: Configure WiX extensions
        run: |
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          wix extension add -g WixToolset.UI --version 5.0.2
          wix extension add -g WixToolset.Heat --version 5.0.2
      - name: Copy MSI packaging files
        run: |
          cp packaging/windows/vetviona.wxs app/build/windows/x64/runner/Release/vetviona.wxs
          cp packaging/windows/LICENSE.rtf app/build/windows/x64/runner/Release/LICENSE.rtf
      - name: Build MSI
        working-directory: app/build/windows/x64/runner/Release
        run: |
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          wix harvest dir . -gg -srd -dr INSTALLFOLDER -cg AppFiles -o harvest.wxs
          wix build vetviona.wxs harvest.wxs -ext WixToolset.UI.wixext -o vetviona-setup.msi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-windows-msi
          path: app/build/windows/x64/runner/Release/vetviona-setup.msi
          retention-days: 7

  export-windows-msix:
    name: Export • Windows Paid (MSIX)
    needs: tests
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          cache: true
      - name: Bootstrap Windows
        working-directory: app
        run: |
          flutter config --enable-windows-desktop
          flutter create --platforms=windows --org com.koshkikode .
          flutter pub get
          dart run flutter_launcher_icons -f icons_windows.yaml
      - name: Build Windows (paid)
        working-directory: app
        run: flutter build windows --release --dart-define=PAID=true
      - name: Build MSIX
        working-directory: app
        run: |
          $version = (Select-String -Path pubspec.yaml -Pattern '^version:').Line -replace '^version:\s*', '' -replace '\+.*', ''
          dart run msix:create --version "$version.0"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-windows-msix
          path: app/build/windows/x64/runner/Release/vetviona-setup.msix
          retention-days: 7

  export-macos-dmg:
    name: Export • macOS Paid (DMG)
    needs: tests
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          cache: true
      - name: Bootstrap macOS
        working-directory: app
        run: |
          flutter config --enable-macos-desktop
          flutter create --platforms=macos --org com.koshkikode .
          flutter pub get
          dart run flutter_launcher_icons -f icons_macos.yaml
      - name: Set macOS deployment target
        run: |
          sed -i '' "s/.*platform :osx, .*/platform :osx, '${MACOS_DEPLOYMENT_TARGET}'/" app/macos/Podfile
          grep -Eq "^platform :osx, '${MACOS_DEPLOYMENT_TARGET}'$" app/macos/Podfile
      - name: Copy macOS entitlements
        run: |
          cp packaging/macos/entitlements.plist app/macos/Runner/Release.entitlements
          cp packaging/macos/entitlements.plist app/macos/Runner/DebugProfile.entitlements
      - name: Build macOS (paid)
        working-directory: app
        run: flutter build macos --release --dart-define=PAID=true
      - name: Package DMG
        run: |
          hdiutil create -volname "Vetviona" \
            -srcfolder "app/build/macos/Build/Products/Release/vetviona_app.app" \
            -ov -format UDZO vetviona-macos.dmg
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-macos
          path: vetviona-macos.dmg
          retention-days: 7

  export-linux-deb:
    name: Export • Linux Paid (DEB)
    needs: tests
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          cache: true
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libunwind-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
      - name: Bootstrap Linux
        working-directory: app
        run: |
          flutter config --enable-linux-desktop
          flutter create --platforms=linux --org com.koshkikode .
          flutter pub get
      - name: Build Linux (paid)
        working-directory: app
        run: flutter build linux --release --dart-define=PAID=true
      - name: Build DEB
        run: |
          sudo apt-get install -y dpkg-dev
          VERSION=$(grep '^version:' app/pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          PKGDIR="vetviona_${VERSION}_amd64"
          mkdir -p "$PKGDIR/usr/lib/vetviona" \
                   "$PKGDIR/usr/bin" \
                   "$PKGDIR/usr/share/applications" \
                   "$PKGDIR/usr/share/icons/hicolor/256x256/apps" \
                   "$PKGDIR/DEBIAN"
          cp -r app/build/linux/x64/release/bundle/* "$PKGDIR/usr/lib/vetviona/"
          cp app/assets/icon/app_icon.png "$PKGDIR/usr/share/icons/hicolor/256x256/apps/vetviona.png"
          cat > "$PKGDIR/usr/bin/vetviona" <<'WRAPPER'
          #!/bin/sh
          cd /usr/lib/vetviona || exit 1
          exec ./vetviona_app "$@"
          WRAPPER
          chmod +x "$PKGDIR/usr/bin/vetviona"
          cat > "$PKGDIR/DEBIAN/control" <<EOF
          Package: vetviona
          Version: $VERSION
          Architecture: amd64
          Maintainer: KoshkiKode <support@koshkikode.com>
          Description: Vetviona — private, local-first genealogy app
          EOF
          cat > "$PKGDIR/usr/share/applications/vetviona.desktop" <<EOF
          [Desktop Entry]
          Name=Vetviona
          Exec=/usr/bin/vetviona
          Icon=vetviona
          Terminal=false
          Type=Application
          Categories=Education;
          EOF
          dpkg-deb --build "$PKGDIR"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-linux-deb
          path: vetviona_*.deb
          retention-days: 7

  export-linux-snap:
    name: Export • Linux Paid (Snap)
    needs: tests
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          cache: true
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libunwind-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
      - name: Bootstrap Linux
        working-directory: app
        run: |
          flutter config --enable-linux-desktop
          flutter create --platforms=linux --org com.koshkikode .
          flutter pub get
      - name: Build Linux (paid)
        working-directory: app
        run: flutter build linux --release --dart-define=PAID=true
      - name: Prepare Snap sources
        run: |
          mkdir -p app/snap-bundle
          cp -r app/build/linux/x64/release/bundle/* app/snap-bundle/
          mkdir -p app/snap
          cp packaging/linux/snap/snapcraft.yaml app/snap/snapcraft.yaml
      - name: Build Snap
        uses: canonical/action-build@3bdaa03e1ba6bf59a65f84a751d943d549a54e79 # v1.3.0
        id: build-snap
        with:
          path: app
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-linux-snap
          path: ${{ steps.build-snap.outputs.snap }}
          retention-days: 7

  export-linux-flatpak:
    name: Export • Linux Paid (Flatpak)
    needs: tests
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          cache: true
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libunwind-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
      - name: Install Flatpak dependencies
        run: |
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//23.08 \
            org.freedesktop.Sdk//23.08
      - name: Bootstrap Linux
        working-directory: app
        run: |
          flutter config --enable-linux-desktop
          flutter create --platforms=linux --org com.koshkikode .
          flutter pub get
      - name: Build Linux (paid)
        working-directory: app
        run: flutter build linux --release --dart-define=PAID=true
      - name: Prepare Flatpak sources
        run: |
          mkdir -p packaging/linux/flatpak/bundle
          cp -r app/build/linux/x64/release/bundle/* packaging/linux/flatpak/bundle/
      - name: Build Flatpak bundle
        run: |
          flatpak-builder --repo=flatpak-repo --force-clean flatpak-build \
            packaging/linux/flatpak/com.koshkikode.Vetviona.yml
          flatpak build-bundle flatpak-repo vetviona.flatpak \
            com.koshkikode.Vetviona
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-linux-flatpak
          path: vetviona.flatpak
          retention-days: 7

  collect-zip:
    name: Collect All Platforms into ZIP
    needs:
      - export-generic-files
      - export-android-paid
      - export-ios-paid
      - export-windows-exe
      - export-windows-msi
      - export-windows-msix
      - export-macos-dmg
      - export-linux-deb
      - export-linux-snap
      - export-linux-flatpak
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          pattern: build-*
          path: all-artifacts
          merge-multiple: false

      - name: Create combined ZIP
        run: |
          cd all-artifacts
          zip -r ../vetviona-all-platforms.zip .

      - name: Upload combined ZIP
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vetviona-all-platforms
          path: vetviona-all-platforms.zip
          retention-days: 7
