name: Build Windows EXE

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Windows EXE
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Scaffold Windows platform
        working-directory: app
        run: flutter create --platforms=windows --org com.koshkikode .

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Generate app icons
        working-directory: app
        run: dart run flutter_launcher_icons -f icons_windows.yaml

      - name: Build Windows (Desktop Pro — paid)
        working-directory: app
        run: flutter build windows --release --dart-define=PAID=true

      - name: Rename executable for packaging
        run: cp app/build/windows/x64/runner/Release/vetviona_app.exe app/build/windows/x64/runner/Release/vetviona.exe

      - name: Upload EXE artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vetviona-windows-exe
          path: app/build/windows/x64/runner/Release/
