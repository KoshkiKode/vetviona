name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

jobs:
  # ── Android ────────────────────────────────────────────────────────────────
  android:
    name: Android APK + AAB
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: '17' }
      - uses: subosito/flutter-action@v2.23.0
        with: { channel: stable, cache: true }
      - working-directory: app
        run: |
          flutter create --platforms=android --org com.koshkikode .
          flutter pub get
          dart run flutter_launcher_icons -f icons_android.yaml
          flutter build apk --release
          flutter build appbundle --release
      - uses: actions/upload-artifact@v7
        with:
          name: release-android-free
          path: |
            app/build/app/outputs/flutter-apk/app-release.apk
            app/build/app/outputs/bundle/release/app-release.aab
      - working-directory: app
        run: |
          flutter build apk --release --dart-define=MOBILE_PAID=true
          flutter build appbundle --release --dart-define=MOBILE_PAID=true
      - uses: actions/upload-artifact@v7
        with:
          name: release-android-paid
          path: |
            app/build/app/outputs/flutter-apk/app-release.apk
            app/build/app/outputs/bundle/release/app-release.aab

  # ── iOS ────────────────────────────────────────────────────────────────────
  ios:
    name: iOS IPA
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2.23.0
        with: { channel: stable, cache: true }
      - name: Scaffold iOS platform
        working-directory: app
        run: flutter create --platforms=ios --org com.koshkikode .
      - name: Set iOS minimum deployment target
        run: sed -i '' "s/# platform :ios, '[0-9.]*'/platform :ios, '15.5'/" app/ios/Podfile
      - working-directory: app
        run: |
          flutter pub get
          dart run flutter_launcher_icons -f icons_ios.yaml
          flutter build ios --release --no-codesign
      - name: Package free IPA
        run: |
          mkdir -p /tmp/Payload
          cp -r app/build/ios/iphoneos/Runner.app /tmp/Payload/
          cd /tmp && zip -r vetviona-free.ipa Payload
      - uses: actions/upload-artifact@v7
        with:
          name: release-ios-free
          path: /tmp/vetviona-free.ipa
      - working-directory: app
        run: flutter build ios --release --no-codesign --dart-define=MOBILE_PAID=true
      - name: Package paid IPA
        run: |
          rm -rf /tmp/Payload
          mkdir -p /tmp/Payload
          cp -r app/build/ios/iphoneos/Runner.app /tmp/Payload/
          cd /tmp && zip -r vetviona-paid.ipa Payload
      - uses: actions/upload-artifact@v7
        with:
          name: release-ios-paid
          path: /tmp/vetviona-paid.ipa

  # ── Windows EXE ───────────────────────────────────────────────────────────
  windows-exe:
    name: Windows EXE
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2.23.0
        with: { channel: stable, cache: true }
      - working-directory: app
        run: |
          flutter config --enable-windows-desktop
          flutter create --platforms=windows --org com.koshkikode .
          flutter pub get
          dart run flutter_launcher_icons -f icons_windows.yaml
          flutter build windows --release --dart-define=PAID=true
      - run: cp app/build/windows/x64/runner/Release/vetviona_app.exe app/build/windows/x64/runner/Release/vetviona.exe
      - uses: actions/upload-artifact@v7
        with:
          name: release-windows-exe
          path: app/build/windows/x64/runner/Release/

  # ── Windows MSI ───────────────────────────────────────────────────────────
  windows-msi:
    name: Windows MSI
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2.23.0
        with: { channel: stable, cache: true }
      - working-directory: app
        run: |
          flutter config --enable-windows-desktop
          flutter create --platforms=windows --org com.koshkikode .
          flutter pub get
          dart run flutter_launcher_icons -f icons_windows.yaml
          flutter build windows --release --dart-define=PAID=true
      - run: cp app/build/windows/x64/runner/Release/vetviona_app.exe app/build/windows/x64/runner/Release/vetviona.exe
      - run: |
          dotnet tool install --global wix --version 5.0.2
          wix extension add -g WixToolset.UI.wixext/5.0.2
          wix extension add -g WixToolset.Heat.wixext/5.0.2
      - run: |
          cp packaging/windows/vetviona.wxs app/build/windows/x64/runner/Release/vetviona.wxs
          cp packaging/windows/LICENSE.rtf app/build/windows/x64/runner/Release/LICENSE.rtf
      - working-directory: app/build/windows/x64/runner/Release
        run: |
          wix harvest dir . -gg -srd -dr INSTALLFOLDER -cg AppFiles -o harvest.wxs
          wix build vetviona.wxs harvest.wxs -ext WixToolset.UI.wixext/5.0.2 -o vetviona-setup.msi
      - uses: actions/upload-artifact@v7
        with:
          name: release-windows-msi
          path: app/build/windows/x64/runner/Release/vetviona-setup.msi

  # ── macOS ──────────────────────────────────────────────────────────────────
  macos:
    name: macOS DMG
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2.23.0
        with: { channel: stable, cache: true }
      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop
      - name: Scaffold macOS platform
        working-directory: app
        run: flutter create --platforms=macos --org com.koshkikode .
      - name: Set macOS minimum deployment target
        run: sed -i '' "s/.*platform :osx, .*/platform :osx, '10.15'/" app/macos/Podfile
      - name: Copy entitlements
        run: |
          cp packaging/macos/entitlements.plist app/macos/Runner/Release.entitlements
          cp packaging/macos/entitlements.plist app/macos/Runner/DebugProfile.entitlements
      - working-directory: app
        run: |
          flutter pub get
          dart run flutter_launcher_icons -f icons_macos.yaml
          flutter build macos --release --dart-define=PAID=true
      - run: |
          hdiutil create -volname "Vetviona" \
            -srcfolder "app/build/macos/Build/Products/Release/vetviona_app.app" \
            -ov -format UDZO vetviona-macos.dmg
      - uses: actions/upload-artifact@v7
        with:
          name: release-macos
          path: vetviona-macos.dmg

  # ── Linux ──────────────────────────────────────────────────────────────────
  linux:
    name: Linux DEB
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libunwind-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            dpkg-dev
      - uses: subosito/flutter-action@v2.23.0
        with: { channel: stable, cache: true }
      - working-directory: app
        run: |
          flutter config --enable-linux-desktop
          flutter create --platforms=linux --org com.koshkikode .
          flutter pub get
          dart run flutter_launcher_icons -f icons_linux.yaml
          flutter build linux --release --dart-define=PAID=true
      - run: |
          VERSION=$(grep '^version:' app/pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          PKGDIR="vetviona_${VERSION}_amd64"
          mkdir -p "$PKGDIR/usr/bin" "$PKGDIR/usr/share/applications" "$PKGDIR/DEBIAN"
          cp -r app/build/linux/x64/release/bundle/* "$PKGDIR/usr/bin/"
          cat > "$PKGDIR/DEBIAN/control" <<EOF
          Package: vetviona
          Version: $VERSION
          Architecture: amd64
          Maintainer: KoshkiKode <support@koshkikode.com>
          Description: Vetviona — private, local-first genealogy app
          EOF
          cat > "$PKGDIR/usr/share/applications/vetviona.desktop" <<EOF
          [Desktop Entry]
          Name=Vetviona
          Exec=/usr/bin/vetviona_app
          Icon=vetviona
          Terminal=false
          Type=Application
          Categories=Education;
          EOF
          dpkg-deb --build "$PKGDIR"
      - uses: actions/upload-artifact@v7
        with:
          name: release-linux-deb
          path: vetviona_*.deb

  # ── Linux Snap ────────────────────────────────────────────────────────────
  snap:
    name: Linux Snap
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libunwind-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
      - uses: subosito/flutter-action@v2.23.0
        with: { channel: stable, cache: true }
      - name: Build Linux app for snap
        working-directory: app
        run: |
          flutter config --enable-linux-desktop
          flutter create --platforms=linux --org com.koshkikode .
          flutter pub get
          dart run flutter_launcher_icons -f icons_linux.yaml
          flutter build linux --release --dart-define=PAID=true
      - name: Stage bundle for snap
        run: |
          mkdir -p app/snap-bundle
          cp -r app/build/linux/x64/release/bundle/* app/snap-bundle/
      - name: Prepare snap directory
        run: |
          mkdir -p app/snap
          cp packaging/linux/snap/snapcraft.yaml app/snap/snapcraft.yaml
      - uses: canonical/action-build@v1.3.0
        id: build-snap
        with:
          path: app
      - uses: actions/upload-artifact@v7
        with:
          name: release-linux-snap
          path: ${{ steps.build-snap.outputs.snap }}

  # ── Linux Flatpak ─────────────────────────────────────────────────────────
  flatpak:
    name: Linux Flatpak
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libunwind-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//23.08 \
            org.freedesktop.Sdk//23.08
      - uses: subosito/flutter-action@v2.23.0
        with: { channel: stable, cache: true }
      - name: Build Linux bundle
        working-directory: app
        run: |
          flutter config --enable-linux-desktop
          flutter create --platforms=linux --org com.koshkikode .
          flutter pub get
          dart run flutter_launcher_icons -f icons_linux.yaml
          flutter build linux --release --dart-define=PAID=true
      - name: Prepare Flatpak bundle source
        run: |
          mkdir -p packaging/linux/flatpak/bundle
          cp -r app/build/linux/x64/release/bundle/* packaging/linux/flatpak/bundle/
      - name: Build Flatpak
        run: |
          flatpak-builder --repo=flatpak-repo --force-clean flatpak-build \
            packaging/linux/flatpak/com.koshkikode.Vetviona.yml
          flatpak build-bundle flatpak-repo vetviona.flatpak \
            com.koshkikode.Vetviona
      - uses: actions/upload-artifact@v7
        with:
          name: release-linux-flatpak
          path: vetviona.flatpak

  # ── Publish GitHub Release ─────────────────────────────────────────────────
  publish:
    name: Publish GitHub Release
    needs: [android, ios, windows-exe, windows-msi, macos, linux, snap, flatpak]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: "Vetviona ${{ inputs.tag || github.ref_name }}"
          body: |
            ## Vetviona ${{ inputs.tag || github.ref_name }}

            ### Downloads

            | Platform | File | Tier | Notes |
            |----------|------|------|-------|
            | Windows  | `vetviona-setup.msi` (artifact: `release-windows-msi`) | Desktop Pro | Recommended Windows installer |
            | Windows  | `vetviona.exe` (artifact: `release-windows-exe`) | Desktop Pro | Standalone executable |
            | macOS    | `vetviona-macos.dmg` | Desktop Pro | Disk image |
            | Linux    | `vetviona_*_amd64.deb` | Desktop Pro | Debian/Ubuntu package |
            | Linux    | `vetviona.flatpak` | Desktop Pro | Flatpak bundle |
            | Linux    | `*.snap` | Desktop Pro | Snap package |
            | Android  | `release-android-free/app-release.apk` | Mobile Free | Manual sync · 100 person limit |
            | Android  | `release-android-free/app-release.aab` | Mobile Free | Play Store bundle |
            | Android  | `release-android-paid/app-release.apk` | Mobile Paid | WiFi auto-sync · unlimited |
            | Android  | `release-android-paid/app-release.aab` | Mobile Paid | Play Store bundle |
            | iOS      | `vetviona-free.ipa` | Mobile Free | Manual sync · 100 person limit |
            | iOS      | `vetviona-paid.ipa` | Mobile Paid | WiFi auto-sync · unlimited |

            ### RootLoop™ Sync Tiers
            - **RootLoop™ Auto** (WiFi, automatic) — Mobile Paid & Desktop Pro
            - **RootLoop™ Manual** (Bluetooth / local, on-demand) — All tiers including Mobile Free
            - Desktop Pro respects connected device tier: free-tier mobile syncs manually, capped at 100 people per session.

            See [vetviona.koshkikode.com](https://vetviona.koshkikode.com) for full release notes.
          files: release-artifacts/**/*
          draft: false
          prerelease: ${{ contains(inputs.tag || github.ref_name, '-') }}
