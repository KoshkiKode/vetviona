name: Build iOS

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Scaffold iOS + Android platform
        working-directory: app
        run: flutter create --platforms=ios,android --org com.koshkikode .

      - name: Set iOS minimum deployment target
        run: sed -i '' "s/# platform :ios, '[0-9.]*'/platform :ios, '13.0'/" app/ios/Podfile

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Generate app icons
        working-directory: app
        run: dart run flutter_launcher_icons

      # ── Free tier ──────────────────────────────────────────────────────────
      - name: Build iOS free (no code sign)
        working-directory: app
        run: flutter build ios --release --no-codesign

      - name: Upload free build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vetviona-ios-free-build
          path: app/build/ios/iphoneos/Runner.app

      # ── Paid tier ──────────────────────────────────────────────────────────
      - name: Build iOS paid (no code sign)
        working-directory: app
        run: flutter build ios --release --no-codesign --dart-define=MOBILE_PAID=true

      - name: Upload paid build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vetviona-ios-paid-build
          path: app/build/ios/iphoneos/Runner.app

