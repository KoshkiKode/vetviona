name: Build Windows MSI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Windows MSI
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Scaffold Windows platform
        working-directory: app
        run: flutter create --platforms=windows --org com.koshkikode .

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Build Windows (Desktop Pro — paid)
        working-directory: app
        run: flutter build windows --release --dart-define=PAID=true

      - name: Rename executable for packaging
        run: cp app/build/windows/x64/runner/Release/vetviona_app.exe app/build/windows/x64/runner/Release/vetviona.exe

      # ── WiX MSI packaging ─────────────────────────────────────────────────
      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix --version 5.0.2
          wix extension add -g WixToolset.UI.wixext

      - name: Copy WiX source files
        run: |
          cp packaging/windows/vetviona.wxs app/build/windows/x64/runner/Release/vetviona.wxs
          cp packaging/windows/LICENSE.rtf app/build/windows/x64/runner/Release/LICENSE.rtf

      - name: Build MSI
        working-directory: app/build/windows/x64/runner/Release
        run: |
          wix build vetviona.wxs -ext WixToolset.UI.wixext -o vetviona-setup.msi

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: vetviona-windows-msi
          path: app/build/windows/x64/runner/Release/vetviona-setup.msi
