name: Build Android

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK & AAB
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          cache: true

      - name: Scaffold Android platform
        working-directory: app
        run: flutter create --platforms=android --org com.koshkikode .

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Generate app icons
        working-directory: app
        run: dart run flutter_launcher_icons -f icons_android.yaml

      # ── Free tier ──────────────────────────────────────────────────────────
      - name: Build APK (free — mobile)
        working-directory: app
        run: flutter build apk --release

      - name: Build App Bundle (free — Play Store)
        working-directory: app
        run: flutter build appbundle --release

      - name: Upload Free APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vetviona-android-free-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Free AAB
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vetviona-android-free-aab
          path: app/build/app/outputs/bundle/release/app-release.aab

      # ── Paid tier ──────────────────────────────────────────────────────────
      - name: Build APK (paid — mobile)
        working-directory: app
        run: flutter build apk --release --dart-define=MOBILE_PAID=true

      - name: Build App Bundle (paid — Play Store)
        working-directory: app
        run: flutter build appbundle --release --dart-define=MOBILE_PAID=true

      - name: Upload Paid APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vetviona-android-paid-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Paid AAB
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vetviona-android-paid-aab
          path: app/build/app/outputs/bundle/release/app-release.aab
