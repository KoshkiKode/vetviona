name: Build Android

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK & AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Scaffold Android platform
        working-directory: app
        run: flutter create --platforms=android --org com.koshkikode .

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Build APK (free — mobile)
        working-directory: app
        run: flutter build apk --release

      - name: Build App Bundle (free — Play Store)
        working-directory: app
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vetviona-android-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: vetviona-android-aab
          path: app/build/app/outputs/bundle/release/app-release.aab
