app-id: com.koshkikode.Vetviona
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk

command: vetviona

finish-args:
  # Display
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  # Network (RootLoop™ Auto WiFi sync)
  - --share=network
  # Bluetooth (RootLoop™ Manual sync)
  - --allow=bluetooth
  # Local file access (GEDCOM import/export, local database)
  - --filesystem=home
  # OpenGL
  - --device=dri

modules:
  - name: vetviona
    buildsystem: simple
    build-commands:
      - mkdir -p /app/bin
      - cp -r * /app/bin/
    sources:
      - type: dir
        path: bundle
