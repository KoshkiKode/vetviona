name: vetviona
version: '1.0.0'
summary: Vetviona — private, local-first genealogy app
description: |
  Build interactive family trees, attach sources, and sync across
  devices without a server you need to maintain. Features include
  GEDCOM import/export, historical place matching, RootLoop™ WiFi
  and Bluetooth sync, source citations, and life timelines.

grade: stable
confinement: strict
base: core22

architectures:
  - build-on: amd64

apps:
  vetviona:
    command: vetviona_app
    extensions: [gnome]
    plugs:
      - network
      - network-bind
      - bluetooth
      - bluez
      - home
      - removable-media
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl

parts:
  vetviona:
    plugin: nil
    source: snap-bundle
    override-build: |
      mkdir -p "$SNAPCRAFT_PART_INSTALL"
      cp -r * "$SNAPCRAFT_PART_INSTALL/"
    stage-packages:
      - libgtk-3-0
      - libblkid1
      - liblzma5
