name: ancestry_app
description: A genealogy app for managing family trees and genetic genealogy.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.0
  sqflite: ^2.0.0
  path: ^1.8.0
  path_provider: ^2.0.0
  http: ^1.0.0
  provider: ^6.0.0
  intl: ^0.19.0
  file_picker: ^5.0.0
  shared_preferences: ^2.0.0
  graphview: ^1.2.0
  flutter_colorpicker: ^1.0.3
  flutter_blue_plus: ^1.0.0
  encrypt: ^5.0.0
  uuid: ^4.0.0
  image_picker: ^1.0.0
  bonsoir: ^5.0.0
  shelf: ^1.4.0
  shelf_router: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
