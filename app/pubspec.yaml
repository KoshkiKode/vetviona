name: ancestry_app
description: A genealogy app for managing family trees and genetic genealogy.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.0
  sqflite: ^2.0.0
  path_provider: ^2.0.0
  http: ^1.0.0
  provider: ^6.0.0
  intl: ^0.19.0
  file_picker: ^5.0.0
  shared_preferences: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
